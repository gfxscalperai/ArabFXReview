<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280" role="img" aria-label="Tickmill logo">
  <defs>
    <linearGradient id="g4" x1="0" x2="1">
      <stop offset="0" stop-color="#064e3b" />
      <stop offset="1" stop-color="#047857" />
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <rect rx="20" width="100%" height="100%" fill="url(#g4)" />
  <g filter="url(#shadow4)">
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#fff">Tickmill</text>
  </g>
  <text x="50%" y="80%" dominant-baseline="middle" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" fill="#e6fff8">Ultra-low spreads</text>
</svg>